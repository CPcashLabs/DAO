<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: 'Redirecting...' }}</title>
    <meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}">
    <link rel="canonical" href="{{ page.redirect_to | absolute_url }}">
    <script>
      window.location.replace("{{ page.redirect_to | relative_url }}");
    </script>
  </head>
  <body>
    <p>
      Redirecting to
      <a href="{{ page.redirect_to | relative_url }}">{{ page.redirect_to | relative_url }}</a>.
    </p>
  </body>
  </html>
