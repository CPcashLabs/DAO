---
layout: default
---

{% assign toc_label = "On this page" %}
{% if page.url contains '/zh-sg/' %}
  {% assign toc_label = "本页目录" %}
{% elsif page.url contains '/ru/' %}
  {% assign toc_label = "Содержание страницы" %}
{% endif %}

<div class="doc-page" data-toc-enabled="{% if page.toc == false %}false{% else %}true{% endif %}">
  <h1>{{ page.title }}</h1>

  <div class="doc-page__content" data-page-content>
    {{ content }}
  </div>

  <nav class="doc-toc" data-doc-toc hidden aria-label="{{ toc_label }}">
    <p class="doc-toc__title">{{ toc_label }}</p>
    <ol class="doc-toc__list" data-doc-toc-list></ol>
  </nav>
</div>

<script>
  (function() {
    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/[\s]+/g, "-")
        .replace(/[^\w\u0400-\u04FF\u4E00-\u9FFF-]+/g, "")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function buildPageToc() {
      var page = document.querySelector(".doc-page[data-toc-enabled='true']");
      if (!page) {
        return;
      }

      var content = page.querySelector("[data-page-content]");
      var toc = page.querySelector("[data-doc-toc]");
      var list = page.querySelector("[data-doc-toc-list]");

      if (!content || !toc || !list) {
        return;
      }

      var headings = Array.prototype.slice.call(content.querySelectorAll("h2, h3")).filter(function(heading) {
        return heading.textContent && heading.textContent.trim().length > 0;
      });

      if (headings.length < 2) {
        return;
      }

      headings.forEach(function(heading, index) {
        if (!heading.id) {
          var baseId = slugify(heading.textContent) || ("section-" + (index + 1));
          var uniqueId = baseId;
          var duplicateIndex = 2;

          while (document.getElementById(uniqueId)) {
            uniqueId = baseId + "-" + duplicateIndex;
            duplicateIndex += 1;
          }

          heading.id = uniqueId;
        }

        var item = document.createElement("li");
        item.className = "doc-toc__item doc-toc__item--" + heading.tagName.toLowerCase();

        var link = document.createElement("a");
        link.className = "doc-toc__link";
        link.href = "#" + heading.id;
        link.textContent = heading.textContent.trim();

        item.appendChild(link);
        list.appendChild(item);
      });

      var insertionPoint = null;
      for (var i = 0; i < content.children.length; i += 1) {
        var child = content.children[i];

        if (child.tagName !== "P") {
          break;
        }

        insertionPoint = child;
      }

      if (insertionPoint) {
        insertionPoint.insertAdjacentElement("afterend", toc);
      } else {
        content.insertAdjacentElement("afterbegin", toc);
      }

      toc.hidden = false;
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", buildPageToc, { once: true });
    } else {
      buildPageToc();
    }
  })();
</script>
